name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - infra/terraform/**
      - core/main/model.pkl
      - .github/workflows/terraform.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra/terraform

concurrency:
  group: terraform-web-xray-dev
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Require Terraform role secret
        env:
          AWS_TERRAFORM_ROLE_ARN: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_TERRAFORM_ROLE_ARN}" ]; then
            echo "::error::AWS_TERRAFORM_ROLE_ARN is not set. Bootstrap the github_actions_terraform role once with admin AWS credentials, then save its ARN as a GitHub Actions secret."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve backend settings
        id: backend
        env:
          REPO_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          REPO_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
          REPO_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          REPO_CONTAINER_IMAGE: ${{ vars.TERRAFORM_CONTAINER_IMAGE }}
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          state_bucket="${REPO_STATE_BUCKET:-web-xray-tfstate-${account_id}-${AWS_REGION}}"
          state_lock_table="${REPO_STATE_LOCK_TABLE:-web-xray-terraform-locks}"
          state_key="${REPO_STATE_KEY:-web-xray/dev/terraform.tfstate}"
          container_image="${REPO_CONTAINER_IMAGE:-docker.io/edmond25/web-xray:latest}"
          github_actions_oidc_provider_arn="arn:aws:iam::${account_id}:oidc-provider/token.actions.githubusercontent.com"

          echo "state_bucket=${state_bucket}" >> "$GITHUB_OUTPUT"
          echo "state_lock_table=${state_lock_table}" >> "$GITHUB_OUTPUT"
          echo "state_key=${state_key}" >> "$GITHUB_OUTPUT"
          echo "container_image=${container_image}" >> "$GITHUB_OUTPUT"
          echo "github_actions_oidc_provider_arn=${github_actions_oidc_provider_arn}" >> "$GITHUB_OUTPUT"

      - name: Bootstrap remote backend
        env:
          STATE_BUCKET: ${{ steps.backend.outputs.state_bucket }}
          STATE_LOCK_TABLE: ${{ steps.backend.outputs.state_lock_table }}
        run: |
          set -euo pipefail

          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" >/dev/null 2>&1; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$STATE_BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$STATE_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$STATE_BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          if ! aws dynamodb describe-table --table-name "$STATE_LOCK_TABLE" >/dev/null 2>&1; then
            aws dynamodb create-table \
              --table-name "$STATE_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST

            aws dynamodb wait table-exists --table-name "$STATE_LOCK_TABLE"
          fi

      - name: Terraform format check
        run: terraform fmt -check

      - name: Terraform init
        env:
          TF_VAR_container_image: ${{ steps.backend.outputs.container_image }}
          TF_VAR_github_actions_oidc_provider_arn: ${{ steps.backend.outputs.github_actions_oidc_provider_arn }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="key=${{ steps.backend.outputs.state_key }}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${{ steps.backend.outputs.state_lock_table }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        env:
          TF_VAR_container_image: ${{ steps.backend.outputs.container_image }}
          TF_VAR_github_actions_oidc_provider_arn: ${{ steps.backend.outputs.github_actions_oidc_provider_arn }}
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_container_image: ${{ steps.backend.outputs.container_image }}
          TF_VAR_github_actions_oidc_provider_arn: ${{ steps.backend.outputs.github_actions_oidc_provider_arn }}
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          TF_VAR_container_image: ${{ steps.backend.outputs.container_image }}
          TF_VAR_github_actions_oidc_provider_arn: ${{ steps.backend.outputs.github_actions_oidc_provider_arn }}
        run: terraform apply -auto-approve tfplan
