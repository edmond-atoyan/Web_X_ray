name: Deploy

on:
  workflow_run:
    workflows:
      - Docker
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: true
        default: latest

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  INSTANCE_TAG_NAME: web-xray-dev-k3s
  K8S_NAMESPACE: web-xray
  DEPLOYMENT_NAME: web-xray
  CONTAINER_NAME: web-xray
  IMAGE_REGISTRY: docker.io
  IMAGE_NAMESPACE: edmond25
  IMAGE_NAME: web-xray

concurrency:
  group: deploy-web-xray-dev
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image reference
        id: image
        env:
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            image_tag="${MANUAL_IMAGE_TAG}"
          else
            short_sha="${WORKFLOW_HEAD_SHA:0:7}"
            image_tag="git-${short_sha}"
          fi

          image_ref="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${image_tag}"

          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${image_ref}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy on EC2 with SSM
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail

          resolve_instance() {
            local instance_id=""
            local ping_status=""

            for lookup_attempt in $(seq 1 30); do
              instance_id="$(aws ec2 describe-instances \
                --region "$AWS_REGION" \
                --filters \
                  "Name=tag:Name,Values=${INSTANCE_TAG_NAME}" \
                  "Name=instance-state-name,Values=running" \
                --query 'sort_by(Reservations[].Instances[], &LaunchTime)[-1].InstanceId' \
                --output text)"

              if [[ -z "${instance_id}" || "${instance_id}" == "None" ]]; then
                echo "No running instance found for ${INSTANCE_TAG_NAME} yet (attempt ${lookup_attempt}/30)" >&2
                sleep 10
                continue
              fi

              ping_status="$(aws ssm describe-instance-information \
                --region "$AWS_REGION" \
                --filters "Key=InstanceIds,Values=${instance_id}" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text)"

              if [[ "${ping_status}" == "Online" ]]; then
                echo "${instance_id}"
                return 0
              fi

              echo "Instance ${instance_id} is not online in SSM yet (PingStatus=${ping_status}, attempt ${lookup_attempt}/30)" >&2
              sleep 10
            done

            echo "Timed out waiting for a running SSM-online instance tagged ${INSTANCE_TAG_NAME}" >&2
            return 1
          }

          cat > ssm-commands.json <<EOF
          {
            "commands": [
              "set -eu",
              "sudo k3s kubectl -n ${K8S_NAMESPACE} set image deployment/${DEPLOYMENT_NAME} ${CONTAINER_NAME}=${IMAGE_REF}",
              "sudo k3s kubectl -n ${K8S_NAMESPACE} rollout status deployment/${DEPLOYMENT_NAME} --timeout=300s",
              "sudo k3s kubectl -n ${K8S_NAMESPACE} get pods -o wide"
            ]
          }
          EOF

          for deploy_attempt in $(seq 1 6); do
            instance_id="$(resolve_instance)"
            echo "Using instance ${instance_id} for deploy attempt ${deploy_attempt}/6"

            command_id="$(aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$instance_id" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy ${IMAGE_REF}" \
              --parameters file://ssm-commands.json \
              --query 'Command.CommandId' \
              --output text)"

            echo "SSM command: ${command_id}"

            for status_attempt in $(seq 1 60); do
              status="$(aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$command_id" \
                --instance-id "$instance_id" \
                --query 'Status' \
                --output text 2>/dev/null || true)"

              case "$status" in
                Success)
                  aws ssm get-command-invocation \
                    --region "$AWS_REGION" \
                    --command-id "$command_id" \
                    --instance-id "$instance_id" \
                    --query 'StandardOutputContent' \
                    --output text
                  exit 0
                  ;;
                Pending|InProgress|Delayed|"")
                  echo "Deployment status: ${status:-Pending} (poll ${status_attempt}/60)"
                  sleep 10
                  ;;
                *)
                  status_details="$(aws ssm get-command-invocation \
                    --region "$AWS_REGION" \
                    --command-id "$command_id" \
                    --instance-id "$instance_id" \
                    --query 'StatusDetails' \
                    --output text 2>/dev/null || true)"

                  if [[ "${status_details}" == "Undeliverable" && "${deploy_attempt}" -lt 6 ]]; then
                    echo "SSM command became undeliverable for instance ${instance_id}; retrying with the latest running instance"
                    sleep 15
                    break
                  fi

                  echo "Deployment failed with status: ${status} (details: ${status_details})" >&2
                  aws ssm get-command-invocation \
                    --region "$AWS_REGION" \
                    --command-id "$command_id" \
                    --instance-id "$instance_id" \
                    --query '{Status:Status,StatusDetails:StatusDetails,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
                    --output json
                  exit 1
                  ;;
              esac
            done
          done

          echo "Timed out waiting for a stable target instance and successful SSM deployment" >&2
          exit 1
