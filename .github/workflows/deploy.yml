name: Deploy

on:
  workflow_run:
    workflows:
      - Docker
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: true
        default: latest

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  INSTANCE_TAG_NAME: web-xray-dev-k3s
  K8S_NAMESPACE: web-xray
  DEPLOYMENT_NAME: web-xray
  CONTAINER_NAME: web-xray
  IMAGE_REGISTRY: docker.io
  IMAGE_NAMESPACE: edmond25
  IMAGE_NAME: web-xray

concurrency:
  group: deploy-web-xray-dev
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image reference
        id: image
        env:
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            image_tag="${MANUAL_IMAGE_TAG}"
          else
            short_sha="${WORKFLOW_HEAD_SHA:0:7}"
            image_tag="git-${short_sha}"
          fi

          image_ref="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${image_tag}"

          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${image_ref}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find target instance
        id: instance
        run: |
          set -euo pipefail

          instance_id="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${INSTANCE_TAG_NAME}" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          if [[ -z "${instance_id}" || "${instance_id}" == "None" ]]; then
            echo "No running instance found with tag Name=${INSTANCE_TAG_NAME}" >&2
            exit 1
          fi

          ping_status="$(aws ssm describe-instance-information \
            --region "$AWS_REGION" \
            --filters "Key=InstanceIds,Values=${instance_id}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text)"

          if [[ "${ping_status}" != "Online" ]]; then
            echo "Instance ${instance_id} is not online in SSM. PingStatus=${ping_status}" >&2
            exit 1
          fi

          echo "instance_id=${instance_id}" >> "$GITHUB_OUTPUT"
          echo "Using instance ${instance_id}"

      - name: Deploy on EC2 with SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail

          cat > ssm-commands.json <<EOF
          {
            "commands": [
              "set -eu",
              "sudo k3s kubectl -n ${K8S_NAMESPACE} set image deployment/${DEPLOYMENT_NAME} ${CONTAINER_NAME}=${IMAGE_REF}",
              "sudo k3s kubectl -n ${K8S_NAMESPACE} rollout status deployment/${DEPLOYMENT_NAME} --timeout=300s",
              "sudo k3s kubectl -n ${K8S_NAMESPACE} get pods -o wide"
            ]
          }
          EOF

          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${IMAGE_REF}" \
            --parameters file://ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)"

          echo "SSM command: ${command_id}"

          for attempt in $(seq 1 60); do
            status="$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)"

            case "$status" in
              Success)
                aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$command_id" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Pending|InProgress|Delayed|"")
                echo "Deployment status: ${status:-Pending} (attempt ${attempt}/60)"
                sleep 10
                ;;
              *)
                echo "Deployment failed with status: ${status}" >&2
                aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$command_id" \
                  --instance-id "$INSTANCE_ID" \
                  --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
                  --output json
                exit 1
                ;;
            esac
          done

          echo "Timed out waiting for deployment command ${command_id}" >&2
          exit 1
